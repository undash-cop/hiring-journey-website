name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate env template parity
        run: npm run validate:env:parity

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        env:
          CI: "true"
          NEXT_PUBLIC_APP_URL: https://hiringjourney.com
          NEXT_PUBLIC_API_URL: https://api.hiringjourney.com
          NEXT_PUBLIC_KEYCLOAK_URL: https://auth.example.com
          NEXT_PUBLIC_KEYCLOAK_REALM: hiringjourney
          NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: hiringjourney-app
        run: npm run build

  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Run backend tests
        env:
          DATABASE_URL: sqlite:///:memory:
        run: pytest -q

  openapi-sync-check:
    runs-on: ubuntu-latest
    needs: [frontend-ci, backend-tests]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend runtime
        run: |
          python -m pip install --upgrade pip
          pip install -e ./backend

      - name: Apply migrations
        run: |
          cd backend
          alembic upgrade head

      - name: Start backend
        run: |
          cd backend
          uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          sleep 5

      - name: Regenerate API client
        run: npm run api:sync

      - name: Verify generated artifacts are committed
        run: git diff --exit-code -- openapi lib/generated

  e2e-smoke:
    runs-on: ubuntu-latest
    needs: frontend-ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build and start
        env:
          CI: "true"
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_KEYCLOAK_URL: https://auth.example.com
          NEXT_PUBLIC_KEYCLOAK_REALM: hiringjourney
          NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: hiringjourney-app
        run: |
          npm run build
          HOSTNAME=127.0.0.1 PORT=3000 npm run start &
          for i in $(seq 1 60); do
            curl -fsS http://127.0.0.1:3000 >/dev/null && break
            sleep 2
          done
          curl -fsS http://127.0.0.1:3000

      - name: Run E2E smoke tests
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
        run: npm run test:e2e
