name: Deploy API (Production)

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: deploy-api-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ secrets.PROD_SSH_HOST != '' }}
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - name: Deploy to production VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -euo pipefail
            cd ${{ secrets.PROD_DEPLOY_PATH }}
            git fetch --tags origin
            git checkout ${{ github.event.release.tag_name || 'main' }}
            git pull origin ${{ github.event.release.tag_name || 'main' }}
            cd backend
            docker compose -f docker-compose.prod.yml --env-file .env.production run --rm api alembic upgrade head
            docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build api nginx

      - name: Smoke test health
        run: |
          curl -fsSL "${{ secrets.PROD_API_URL }}/health"
          curl -fsSL "${{ secrets.PROD_API_URL }}/ready"

      - name: Verify OpenAPI reachable
        run: curl -fsSL "${{ secrets.PROD_API_URL }}/openapi.json" | head -c 500
