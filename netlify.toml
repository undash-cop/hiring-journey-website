# Next.js on Netlify: @netlify/plugin-nextjs manages output; do not set publish to .next.
[build]
  command = "npm run build"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "22"

# API calls use NEXT_PUBLIC_API_URL directly (CORS on api.hiringjourney.com).

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/logos/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
