version: "3.9"

# High-availability API: two API replicas behind Nginx upstream.
# Use for rolling deploys — update api-1, verify, then api-2.

services:
  db:
    image: postgres:16-alpine
    container_name: hiring-journey-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  api-1:
    build:
      context: .
      dockerfile: Dockerfile
    image: hiring-journey-api:prod
    container_name: hiring-journey-api-1
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.production
    networks:
      - backend

  api-2:
    build:
      context: .
      dockerfile: Dockerfile
    image: hiring-journey-api:prod
    container_name: hiring-journey-api-2
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.production
    networks:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: hiring-journey-nginx
    restart: unless-stopped
    depends_on:
      - api-1
      - api-2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/api-upstream.conf:/etc/nginx/conf.d/default.conf:ro
      - ${SSL_CERT_PATH}:/etc/nginx/ssl/fullchain.pem:ro
      - ${SSL_KEY_PATH}:/etc/nginx/ssl/privkey.pem:ro
    networks:
      - backend

volumes:
  postgres_data:

networks:
  backend:
